services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: blogger
      POSTGRES_PASSWORD: blogger
      POSTGRES_DB: blogger
    ports:
      - "5432:5432"
    volumes:
      - blogger-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogger -d blogger"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  blogger-postgres:
